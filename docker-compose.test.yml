
services:
  postgres-db-test:
    image: postgres:16.14
    container_name: postgres-db-test
    restart: "no"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: system-management-test
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5433"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 10