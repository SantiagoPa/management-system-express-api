name: Tests management-system-api

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16.14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: system-management-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Crear archivo .env.test
        run: |
          cat > .env.test << 'EOF'
          PORT=3001
          PUBLIC_PATH=public
          POSTGRES_URL=postgresql://postgres:postgres@localhost:5432/system-management-test
          NODE_ENV=test
          EOF

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Generar cliente de Prisma
        run: pnpm exec prisma generate

      - name: Ejecutar tests con cobertura
        run: pnpm run test:coverage