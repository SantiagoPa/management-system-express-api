name: CI/CD management-system-api

on:
  push:
    branches: [ main ]

jobs:

  test:
    runs-on: self-hosted

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Crear archivo .env.test
        run: |
          cat > .env.test << 'EOF'
          PORT=3001
          PUBLIC_PATH=public
          POSTGRES_URL=postgresql://postgres:postgres@localhost:5433/system-management-test
          NODE_ENV=test
          EOF

      - name: Levantar Postgres de test
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Generar cliente de Prisma
        run: pnpm exec prisma generate

      - name: Ejecutar tests con cobertura
        run: pnpm run test:coverage

      - name: Detener y limpiar contenedores de test
        if: always()
        run: docker compose -f docker-compose.test.yml down -v